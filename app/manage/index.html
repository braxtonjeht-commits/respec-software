<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage | Respec Software</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#07080A; --ink-1:#0F1115; --ink-2:#161A20;
    --border:rgba(255,255,255,0.07); --border-2:rgba(255,255,255,0.12);
    --green:#4ade80; --green-dim:rgba(74,222,128,0.08);
    --text:#E2E8F0; --text-2:#94A3B8; --text-3:#8B97AB;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --r-sm:6px; --r-md:12px;
    --on-brand:#06250f; /* text colour on brand-filled buttons; set per-company at runtime */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  #gate{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--mono);font-size:13px;color:var(--text-3)}
  #app{display:none}

  header{border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;position:sticky;top:0;background:rgba(7,8,10,.9);backdrop-filter:blur(12px);z-index:10}
  .brand{font-family:var(--mono);font-weight:700;font-size:16px}
  .brand .slash{color:var(--green)}
  .who{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:2px}
  .who b{color:var(--green);font-weight:700}
  .hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .lnk{font-family:var(--mono);font-size:12px;color:var(--text-2);border:1px solid var(--border-2);border-radius:999px;padding:8px 13px;cursor:pointer;background:none;min-height:36px;display:inline-flex;align-items:center}
  .lnk:hover{color:var(--text);border-color:var(--green)}
  .lnk.pri{background:var(--green);color:var(--on-brand);border-color:var(--green);font-weight:700}

  .tabs{display:flex;gap:8px;padding:14px 20px 0;flex-wrap:wrap}
  .tab{font-family:var(--mono);font-size:12px;padding:8px 15px;border-radius:999px;background:var(--ink-1);border:1px solid var(--border-2);color:var(--text-2);cursor:pointer;min-height:36px}
  .tab.active{background:var(--green);color:var(--on-brand);border-color:var(--green);font-weight:700}
  .wrap{padding:16px 20px 60px;max-width:1100px;margin:0 auto}

  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .stat{background:var(--ink-1);border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:88px}
  .stat .n{font-family:var(--display);font-size:19px;font-weight:700;color:var(--green)}
  .stat .l{font-family:var(--mono);font-size:10px;color:var(--text-3);letter-spacing:.04em}

  .order{background:var(--ink-1);border:1px solid var(--border);border-radius:var(--r-md);padding:15px;margin-bottom:10px}
  .o-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .oid{font-family:var(--mono);font-size:13px;font-weight:700}
  .oname{font-size:14px}
  .ometa{font-size:12px;color:var(--text-3);margin-top:2px}
  .badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;border:1px solid var(--border-2);color:var(--text-2)}
  .badge.b-new{background:rgba(148,163,184,.15);color:#94A3B8}
  .badge.b-diag{background:rgba(96,165,250,.15);color:#60a5fa}
  .badge.b-wait{background:rgba(249,115,22,.15);color:#f97316}
  .badge.b-prog{background:rgba(74,222,128,.15);color:var(--green)}
  .badge.b-done{background:rgba(148,163,184,.15);color:#94A3B8}
  .badge.pub{background:rgba(96,165,250,.12);color:#60a5fa}
  .o-ctl{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
  select.status{background:var(--ink-2);border:1px solid var(--border-2);color:var(--text);padding:8px 10px;border-radius:var(--r-sm);font-family:var(--mono);font-size:12px;min-height:38px}
  select.status:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .paid-btn{font-family:var(--mono);font-size:11px;padding:8px 12px;border-radius:999px;border:1px solid var(--border-2);background:none;color:var(--text-2);cursor:pointer;min-height:36px}
  .paid-btn.on{background:var(--green-dim);border-color:var(--green);color:var(--green)}

  .ev{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;align-items:baseline}
  .ev-when{font-family:var(--mono);font-size:11px;color:var(--text-3);min-width:132px}
  .ev-who{font-family:var(--mono);font-size:11.5px;color:var(--green);min-width:180px}
  .ev-what{color:var(--text-2)}
  .ev-what b{color:var(--text);font-weight:600}
  .empty{color:var(--text-3);font-size:14px;padding:26px 0;text-align:center;font-family:var(--mono)}
  .filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .filters select,.filters input{background:var(--ink-1);border:1px solid var(--border-2);color:var(--text);padding:8px 10px;border-radius:var(--r-sm);font-family:var(--mono);font-size:12px;min-height:38px}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--on-brand);padding:10px 18px;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:700;display:none;z-index:50}

  /* ---- order detail drawer ---- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:100}
  .overlay.show{display:flex}
  @media(min-width:720px){ .overlay{align-items:center} }
  .sheet{background:var(--ink-1);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;padding:22px}
  @media(min-width:720px){ .sheet{border-radius:16px} }
  .sheet-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px}
  .sheet-title{font-family:var(--mono);font-weight:700;font-size:15px}
  .sheet-sub{font-size:13px;color:var(--text-2);margin-top:3px}
  .close-x{background:rgba(255,255,255,.06);border:none;color:var(--text);width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;flex-shrink:0}
  .sect{margin-bottom:18px}
  .sect-h{font-family:var(--mono);font-size:10.5px;color:var(--green);letter-spacing:.08em;text-transform:uppercase;margin-bottom:9px}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
  .kv .k{color:var(--text-3)}
  textarea.ta{width:100%;background:var(--ink-2);border:1px solid var(--border-2);border-radius:var(--r-sm);color:var(--text);
    font-family:var(--body);font-size:14px;padding:11px 12px;min-height:78px;resize:vertical}
  textarea.ta:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .hint{font-size:11.5px;color:var(--text-3);margin-top:6px}
  .act{font-family:var(--mono);font-size:12px;font-weight:700;padding:10px 16px;border-radius:999px;border:none;cursor:pointer;background:var(--green);color:var(--on-brand);margin-top:9px}
  .act.ghost{background:none;border:1px solid var(--border-2);color:var(--text-2);font-weight:500}
  .act:disabled{opacity:.6;cursor:wait}
  .msg{border-left:2px solid var(--border-2);padding:8px 0 8px 11px;margin-bottom:9px}
  .msg-top{display:flex;justify-content:space-between;gap:10px;font-family:var(--mono);font-size:10.5px;color:var(--text-3);flex-wrap:wrap}
  .msg-body{font-size:13px;color:var(--text-2);margin-top:4px}
  .pill{font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:20px;border:1px solid var(--border-2)}
  .pill.ok{color:var(--green);border-color:rgba(74,222,128,.4)}
  .pill.warn{color:#f97316;border-color:rgba(249,115,22,.4)}
  .pill.bad{color:#ef4444;border-color:rgba(239,68,68,.4)}
  .switch{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--ink-2);border:1px solid var(--border-2);border-radius:var(--r-sm);padding:10px 12px;font-size:13px}
  .tg{width:42px;height:23px;border-radius:20px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;flex-shrink:0;border:none}
  .tg.on{background:var(--green)}
  .tg::after{content:'';position:absolute;width:19px;height:19px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.15s}
  .tg.on::after{left:21px}
</style>
</head>
<body>

<div id="gate">Checking your session…</div>

<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <img id="co-logo" alt="" style="display:none;height:34px;width:34px;border-radius:8px;object-fit:cover">
      <div>
        <div class="brand" id="co-title"><span class="slash">/</span>respec — manage</div>
        <div class="who" id="who"></div>
      </div>
    </div>
    <div class="hdr-actions">
      <a class="lnk" href="/app/hud/" target="_blank" rel="noopener">HUD ↗</a>
      <a class="lnk pri" id="new-order" href="/app/intake/">+ New order</a>
      <button class="lnk" id="signout">Sign out</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="orders">Orders</button>
    <button class="tab" data-tab="audit" id="tab-audit" style="display:none">Audit log</button>
  </div>

  <div class="wrap">
    <!-- ORDERS -->
    <section id="pane-orders">
      <div class="stats" id="stats"></div>
      <div class="filters">
        <select id="f-status">
          <option value="">All statuses</option>
        </select>
        <input id="f-search" type="search" placeholder="Search name / order #">
      </div>
      <div id="orders"></div>
    </section>

    <!-- AUDIT (owners only) -->
    <section id="pane-audit" style="display:none">
      <div class="filters">
        <select id="f-actor"><option value="">All employees</option></select>
      </div>
      <div id="events"></div>
    </section>
  </div>
</div>

<!-- ORDER DETAIL -->
<div class="overlay" id="overlay">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
    <div class="sheet-head">
      <div>
        <div class="sheet-title" id="sheet-title">—</div>
        <div class="sheet-sub" id="sheet-sub"></div>
      </div>
      <button class="close-x" id="close-sheet" aria-label="Close">✕</button>
    </div>

    <div class="sect">
      <div class="sect-h">Customer</div>
      <div id="d-customer"></div>
    </div>

    <div class="sect">
      <div class="sect-h">Shop notes</div>
      <textarea class="ta" id="d-notes" placeholder="Internal notes (not sent to the customer)…"></textarea>
      <div class="hint">Internal only — the customer never sees this. Edits are recorded in the audit log.</div>
      <button class="act" id="save-notes">Save notes</button>
    </div>

    <div class="sect">
      <div class="sect-h">Customer notifications</div>
      <div class="switch">
        <span>Email the customer when status changes</span>
        <button class="tg" id="d-notify" aria-label="Toggle customer notifications"></button>
      </div>
      <div class="hint" id="notify-hint"></div>
    </div>

    <div class="sect">
      <div class="sect-h">Send message to customer</div>
      <textarea class="ta" id="d-msg" placeholder="Type a message to send to the customer…"></textarea>
      <button class="act" id="send-msg">✉ Send</button>
      <button class="act ghost" id="clear-msg">Clear</button>
      <div class="hint" id="send-hint"></div>
    </div>

    <div class="sect">
      <div class="sect-h">Message history</div>
      <div id="d-msgs"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Saved</div>

<script type="module">
/* Manage dashboard.
   SECURITY: this page holds no data of its own. Every row comes from Supabase
   under the signed-in user's session, and RLS returns only this company's rows.
   The audit log is owner-only at the DATABASE level (RLS), so hiding the tab is
   convenience — a member who forced it open would still receive zero rows. */
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://cnpyltipddxfjyucigxj.supabase.co',
  'sb_publishable_KiFNYwFxTLG9wVSjFqJqjw__DWHWGQK',
  { auth: { persistSession: true, autoRefreshToken: true } }
);

const STATUSES = ['New','Diagnosing','Waiting on Parts','In Progress','Complete','Shipped'];
const BADGE = { 'New':'b-new','Diagnosing':'b-diag','Waiting on Parts':'b-wait','In Progress':'b-prog','Complete':'b-done','Shipped':'b-done' };

const gate = document.getElementById('gate');
const app  = document.getElementById('app');
let company = null, role = null, orders = [], companyId = null;

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const toast = (m) => { const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',1600); };

/* Apply the company's own branding. Falls back to the Respec green if a
   company hasn't set one, so an unbranded tenant still looks intentional. */
function applyBrand(co) {
  const color = (co.brand_color || '').trim();
  if (/^#[0-9a-f]{6}$/i.test(color)) {
    const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
    const root = document.documentElement.style;
    root.setProperty('--green', color);
    root.setProperty('--green-dim', `rgba(${r},${g},${b},0.10)`);
    // Keep button text readable on light brand colours.
    const lum = (0.2126*r + 0.7152*g + 0.0722*b) / 255;
    root.setProperty('--on-brand', lum > 0.6 ? '#0b1220' : '#06250f');
  }
  document.getElementById('co-title').innerHTML =
    `<span class="slash">/</span>${esc(co.name || 'respec')} — manage`;
  document.title = `${co.name || 'Manage'} | Respec`;
  if (co.logo_url) {
    const img = document.getElementById('co-logo');
    img.src = co.logo_url; img.alt = co.name || ''; img.style.display = 'block';
  }
}

/* ---- Auth guard ---- */
async function guard() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { location.replace('/login/'); return false; }
  const { data: mine, error } = await supabase.from('my_company')
    .select('id, company_code, name, role, brand_color, logo_url').maybeSingle();
  if (error || !mine) { await supabase.auth.signOut(); location.replace('/login/'); return false; }
  company = mine; role = mine.role; companyId = mine.id;
  applyBrand(mine);
  document.getElementById('who').innerHTML =
    `${esc(session.user.email)} · <b>${esc(mine.company_code)}</b> · ${esc(role)}`;
  document.getElementById('new-order').href = '/app/intake/?c=' + encodeURIComponent(mine.company_code);
  if (role === 'owner') document.getElementById('tab-audit').style.display = '';
  gate.style.display = 'none';
  app.style.display = 'block';
  return true;
}

/* ---- Orders ---- */
async function loadOrders() {
  const { data, error } = await supabase.from('orders')
    .select('id, order_code, customer_name, customer_email, customer_phone, vehicle, service, notes, status, paid, source, notify_customer, created_at')
    .order('created_at', { ascending: false });
  if (error) { document.getElementById('orders').innerHTML = '<p class="empty">Could not load orders.</p>'; return; }
  orders = data || [];
  renderStats();
  renderOrders();
}

function renderStats() {
  const open = orders.filter(o => !['Complete','Shipped'].includes(o.status)).length;
  const unpaid = orders.filter(o => !o.paid).length;
  document.getElementById('stats').innerHTML = [
    ['Total', orders.length], ['Open', open], ['Unpaid', unpaid]
  ].map(([l,n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l.toUpperCase()}</div></div>`).join('');
}

function renderOrders() {
  const fs = document.getElementById('f-status').value;
  const q  = document.getElementById('f-search').value.trim().toLowerCase();
  const list = orders.filter(o =>
    (!fs || o.status === fs) &&
    (!q || (o.customer_name||'').toLowerCase().includes(q) || (o.order_code||'').toLowerCase().includes(q))
  );
  const el = document.getElementById('orders');
  if (!list.length) { el.innerHTML = '<p class="empty">No orders yet.</p>'; return; }
  el.innerHTML = list.map(o => `
    <div class="order" data-id="${o.id}">
      <div class="o-top">
        <div>
          <div class="oid">${esc(o.order_code)} ${o.source==='public' ? '<span class="badge pub">WEB</span>' : ''}</div>
          <div class="oname">${esc(o.customer_name)}</div>
          <div class="ometa">${esc([o.vehicle,o.service].filter(Boolean).join(' · '))}${o.customer_phone ? ' · ' + esc(o.customer_phone) : ''}</div>
        </div>
        <span class="badge ${BADGE[o.status]||''}">${esc(o.status)}</span>
      </div>
      <div class="o-ctl">
        <select class="status" data-id="${o.id}">
          ${STATUSES.map(s => `<option ${s===o.status?'selected':''}>${s}</option>`).join('')}
        </select>
        <button class="paid-btn ${o.paid?'on':''}" data-id="${o.id}" data-paid="${o.paid}">${o.paid ? '✓ Paid' : 'Mark paid'}</button>
        <button class="paid-btn open-detail" data-id="${o.id}">Notes &amp; messages →</button>
      </div>
    </div>`).join('');
}

/* ---- Order detail drawer: notes, notifications, customer messages ---- */
let current = null;

function openDetail(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  current = o;
  document.getElementById('sheet-title').textContent = o.order_code;
  document.getElementById('sheet-sub').textContent = `${o.customer_name}${o.vehicle ? ' · ' + o.vehicle : ''}`;
  document.getElementById('d-customer').innerHTML = [
    ['Name', o.customer_name], ['Email', o.customer_email || '—'],
    ['Phone', o.customer_phone || '—'], ['Service', o.service || '—'],
    ['Status', o.status], ['Paid', o.paid ? 'Yes' : 'No']
  ].map(([k,v]) => `<div class="kv"><span class="k">${k}</span><span>${esc(v)}</span></div>`).join('');
  document.getElementById('d-notes').value = o.notes || '';

  const tg = document.getElementById('d-notify');
  tg.classList.toggle('on', !!o.notify_customer);
  tg.setAttribute('aria-pressed', String(!!o.notify_customer));

  const hasEmail = !!(o.customer_email && o.customer_email.trim());
  document.getElementById('notify-hint').textContent = hasEmail
    ? 'Sends an email through n8n each time you change this order’s status.'
    : 'No email on file for this customer — notifications will be skipped.';
  document.getElementById('send-hint').textContent = hasEmail
    ? '' : 'No email on file — this message cannot be delivered.';
  document.getElementById('send-msg').disabled = !hasEmail;

  document.getElementById('overlay').classList.add('show');
  loadMessages(o.id);
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('show');
  current = null;
}

/* 'sent' only after n8n returns 2xx — 'dispatched' means handed to pg_net and
   still awaiting n8n's response, so it must not be shown as delivered. */
const DELIV = {
  sent:       ['ok','sent'],
  dispatched: ['warn','sending…'],
  pending:    ['warn','pending'],
  failed:     ['bad','failed'],
  skipped:    ['warn','skipped']
};

async function loadMessages(orderId) {
  const el = document.getElementById('d-msgs');
  const { data, error } = await supabase.from('order_messages')
    .select('id, kind, body, from_status, to_status, sent_by_name, delivery, delivery_note, created_at')
    .eq('order_id', orderId).order('created_at', { ascending: false });
  if (error) { el.innerHTML = '<p class="hint">Could not load messages.</p>'; return; }
  const msgs = data || [];
  if (!msgs.length) { el.innerHTML = '<p class="hint">No messages sent yet.</p>'; return; }
  el.innerHTML = msgs.map(m => {
    const [cls, label] = DELIV[m.delivery] || ['', m.delivery];
    const what = m.kind === 'status_update'
      ? `Status update: ${esc(m.from_status)} → ${esc(m.to_status)}`
      : esc(m.body || '');
    return `<div class="msg">
      <div class="msg-top">
        <span>${new Date(m.created_at).toLocaleString()} · ${esc(m.sent_by_name || 'system')}</span>
        <span class="pill ${cls}" title="${esc(m.delivery_note || '')}">${esc(label)}</span>
      </div>
      <div class="msg-body">${what}</div>
    </div>`;
  }).join('');
}

document.getElementById('orders').addEventListener('click', (e) => {
  const b = e.target.closest('.open-detail');
  if (b) openDetail(b.dataset.id);
});
document.getElementById('close-sheet').addEventListener('click', closeDetail);
document.getElementById('overlay').addEventListener('click', (e) => { if (e.target.id === 'overlay') closeDetail(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

document.getElementById('save-notes').addEventListener('click', async () => {
  if (!current) return;
  const btn = document.getElementById('save-notes');
  btn.disabled = true;
  const { error } = await supabase.from('orders')
    .update({ notes: document.getElementById('d-notes').value }).eq('id', current.id);
  btn.disabled = false;
  if (error) { toast('Could not save notes'); return; }
  toast('Notes saved');
  await loadOrders();
  if (role === 'owner') loadEvents();
});

document.getElementById('d-notify').addEventListener('click', async () => {
  if (!current) return;
  const tg = document.getElementById('d-notify');
  const next = !tg.classList.contains('on');
  const { error } = await supabase.from('orders').update({ notify_customer: next }).eq('id', current.id);
  if (error) { toast('Could not update'); return; }
  tg.classList.toggle('on', next);
  tg.setAttribute('aria-pressed', String(next));
  current.notify_customer = next;
  toast(next ? 'Customer will be emailed' : 'Notifications off for this order');
  await loadOrders();
});

document.getElementById('clear-msg').addEventListener('click', () => {
  document.getElementById('d-msg').value = '';
});

document.getElementById('send-msg').addEventListener('click', async () => {
  if (!current) return;
  const body = document.getElementById('d-msg').value.trim();
  if (!body) { toast('Type a message first'); return; }
  const btn = document.getElementById('send-msg');
  btn.disabled = true; btn.textContent = 'Sending…';
  // sent_by / delivery are stamped server-side; the client cannot forge them.
  const { error } = await supabase.from('order_messages').insert({
    company_id: companyId, order_id: current.id, kind: 'custom', channel: 'email', body
  });
  btn.disabled = false; btn.textContent = '✉ Send';
  if (error) { toast('Could not send'); return; }
  document.getElementById('d-msg').value = '';
  toast('Message queued to n8n');
  loadMessages(current.id);
});

document.getElementById('orders').addEventListener('change', async (e) => {
  const sel = e.target.closest('select.status');
  if (!sel) return;
  const { error } = await supabase.from('orders').update({ status: sel.value }).eq('id', sel.dataset.id);
  if (error) { toast('Update failed'); return; }
  toast('Status updated');
  await loadOrders();
  if (role === 'owner') loadEvents();
});

document.getElementById('orders').addEventListener('click', async (e) => {
  const btn = e.target.closest('.paid-btn');
  if (!btn) return;
  const next = btn.dataset.paid !== 'true';
  const { error } = await supabase.from('orders').update({ paid: next }).eq('id', btn.dataset.id);
  if (error) { toast('Update failed'); return; }
  toast(next ? 'Marked paid' : 'Marked unpaid');
  await loadOrders();
  if (role === 'owner') loadEvents();
});

document.getElementById('f-status').addEventListener('change', renderOrders);
document.getElementById('f-search').addEventListener('input', renderOrders);

/* ---- Audit log (owners) ---- */
const ACTION_TEXT = {
  created_staff:  'created the order',
  created_public: 'order submitted from the web form',
  status_changed: 'changed status',
  paid_changed:   'changed payment',
  notes_edited:   'edited notes'
};

async function loadEvents() {
  const { data, error } = await supabase.from('order_events')
    .select('id, order_code, actor_email, actor_name, action, from_value, to_value, created_at')
    .order('created_at', { ascending: false }).limit(300);
  const el = document.getElementById('events');
  if (error) { el.innerHTML = '<p class="empty">Could not load the audit log.</p>'; return; }
  const evs = data || [];

  const actors = [...new Set(evs.map(e => e.actor_email).filter(Boolean))];
  const sel = document.getElementById('f-actor');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All employees</option>' +
    actors.map(a => `<option ${a===cur?'selected':''}>${esc(a)}</option>`).join('');

  const filtered = cur ? evs.filter(e => e.actor_email === cur) : evs;
  if (!filtered.length) { el.innerHTML = '<p class="empty">No activity yet.</p>'; return; }

  el.innerHTML = filtered.map(e => {
    const who = e.actor_email ? esc(e.actor_name || e.actor_email) : 'Customer (web form)';
    let what = ACTION_TEXT[e.action] || esc(e.action);
    if (e.action === 'status_changed') what = `changed <b>${esc(e.order_code)}</b> from <b>${esc(e.from_value)}</b> to <b>${esc(e.to_value)}</b>`;
    else if (e.action === 'paid_changed') what = `marked <b>${esc(e.order_code)}</b> ${e.to_value === 'true' ? '<b>paid</b>' : '<b>unpaid</b>'}`;
    else what = `${what} — <b>${esc(e.order_code)}</b>`;
    return `<div class="ev">
      <span class="ev-when">${new Date(e.created_at).toLocaleString()}</span>
      <span class="ev-who">${who}</span>
      <span class="ev-what">${what}</span>
    </div>`;
  }).join('');
}
document.getElementById('f-actor').addEventListener('change', loadEvents);

/* ---- Tabs ---- */
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  const isAudit = t.dataset.tab === 'audit';
  document.getElementById('pane-orders').style.display = isAudit ? 'none' : 'block';
  document.getElementById('pane-audit').style.display  = isAudit ? 'block' : 'none';
  if (isAudit) loadEvents();
}));

document.getElementById('signout').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.replace('/login/');
});
supabase.auth.onAuthStateChange((e) => { if (e === 'SIGNED_OUT') location.replace('/login/'); });

/* ---- Boot ---- */
(async () => {
  if (!(await guard())) return;
  document.getElementById('f-status').innerHTML =
    '<option value="">All statuses</option>' + STATUSES.map(s => `<option>${s}</option>`).join('');
  await loadOrders();
  // Live updates: RLS applies to realtime too.
  supabase.channel('orders-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, loadOrders)
    .subscribe();
})();
</script>
</body>
</html>
