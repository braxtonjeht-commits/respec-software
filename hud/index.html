<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — Shop HUD | Respec Software</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07080A;color:#E2E8F0;font-family:'JetBrains Mono',monospace;min-height:100vh;overflow:hidden}
.demo-badge{position:fixed;top:16px;right:16px;background:#4ade80;color:#041a0b;font-size:12px;font-weight:700;padding:6px 16px;border-radius:20px;letter-spacing:0.05em;z-index:100}
header{display:flex;justify-content:space-between;align-items:center;padding:24px 32px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo{font-weight:700;font-size:22px;display:flex;align-items:center;gap:8px}
.logo .slash{color:#4ade80}
.clock{font-size:20px;color:#94A3B8}
.stats-bar{display:flex;gap:16px;padding:16px 32px}
.stat{background:#0F1115;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 24px;flex:1}
.stat .n{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:#4ade80}
.stat .l{font-size:11px;color:#64748B;letter-spacing:0.06em;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:8px 32px 32px}
.card{background:#0F1115;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.card.pulse{animation:pulse 1.2s ease-in-out 3}
@keyframes pulse{0%,100%{border-color:rgba(255,255,255,0.08)}50%{border-color:#f97316;box-shadow:0 0 20px rgba(249,115,22,0.3)}}
.card-oid{font-weight:700;font-size:16px;margin-bottom:6px}
.card-name{font-size:13px;color:#94A3B8;margin-bottom:10px}
.badge{display:inline-block;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:700}
.b-diag{background:rgba(96,165,250,0.15);color:#60a5fa}
.b-wait{background:rgba(249,115,22,0.15);color:#f97316}
.b-prog{background:rgba(74,222,128,0.15);color:#4ade80}
.b-done{background:rgba(148,163,184,0.15);color:#94A3B8}
.new-flag{position:absolute;top:0;right:0;background:#f97316;color:#1a0800;font-size:10px;font-weight:700;padding:4px 10px;border-radius:0 14px 0 10px}
.alert-banner{position:fixed;top:0;left:0;right:0;background:#f97316;color:#1a0800;text-align:center;padding:14px;font-weight:700;font-size:14px;transform:translateY(-100%);transition:transform 0.4s;z-index:50}
.alert-banner.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="demo-badge">◉ DEMO MODE — Simulated live data</div>
<div class="alert-banner" id="alertBanner">🔔 NEW ORDER RECEIVED — ECU-1047</div>
<header>
  <div class="logo"><span class="slash">/</span>respec — shop floor display demo</div>
  <div class="clock" id="clock"></div>
</header>
<div class="stats-bar" id="statsBar"></div>
<div class="grid" id="grid"></div>

<script>
let orders = [
  {id:'ECU-1042', name:'Kevin Sanders', status:'In Progress', isNew:false},
  {id:'ECU-1043', name:'Maria Lopez', status:'Diagnosing', isNew:false},
  {id:'ECU-1044', name:'David Chen', status:'Waiting on Parts', isNew:false},
  {id:'ECU-1045', name:'James Miller', status:'In Progress', isNew:false},
  {id:'ECU-1046', name:'Ashley Brooks', status:'Diagnosing', isNew:false},
  {id:'ECU-1041', name:'Tom Reyes', status:'Waiting on Parts', isNew:false},
];

function badgeClass(s){
  if(s==='Diagnosing') return 'b-diag';
  if(s==='Waiting on Parts') return 'b-wait';
  if(s==='In Progress') return 'b-prog';
  return 'b-done';
}

function renderStats(){
  const active = orders.filter(o=>o.status==='In Progress'||o.status==='Diagnosing').length;
  const waiting = orders.filter(o=>o.status==='Waiting on Parts').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="n">${orders.length}</div><div class="l">TOTAL ORDERS IN SHOP</div></div>
    <div class="stat"><div class="n">${active}</div><div class="l">ACTIVELY BEING WORKED</div></div>
    <div class="stat"><div class="n">${waiting}</div><div class="l">WAITING ON PARTS</div></div>
  `;
}

function renderGrid(){
  document.getElementById('grid').innerHTML = orders.map(o=>`
    <div class="card ${o.isNew ? 'pulse' : ''}">
      ${o.isNew ? '<div class="new-flag">NEW</div>' : ''}
      <div class="card-oid">${o.id}</div>
      <div class="card-name">${o.name}</div>
      <div class="badge ${badgeClass(o.status)}">${o.status}</div>
    </div>
  `).join('');
  orders.forEach(o=>o.isNew=false);
}

function updateClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

renderStats();
renderGrid();
updateClock();
setInterval(updateClock, 1000);

// simulate a new order arriving after 8 seconds, for demo drama
setTimeout(()=>{
  orders.unshift({id:'ECU-1047', name:'Rachel Kim', status:'Diagnosing', isNew:true});
  document.getElementById('alertBanner').classList.add('show');
  renderStats();
  renderGrid();
  setTimeout(()=>document.getElementById('alertBanner').classList.remove('show'), 3500);
}, 8000);
</script>
</body>
</html>
